services:
  lgtm:
    # Grafana's all-in-one OpenTelemetry backend: Loki, Grafana, Tempo, Mimir
    # (Prometheus), Pyroscope + an OpenTelemetry Collector.
    # https://github.com/grafana/docker-otel-lgtm
    image: grafana/otel-lgtm:latest
    container_name: copilot-lgtm
    ports:
      - "3000:3000"   # Grafana UI            -> http://localhost:3000 (admin/admin)
      - "4317:4317"   # OTLP/gRPC ingest
      - "4318:4318"   # OTLP/HTTP ingest       <- VS Code Copilot exports here
      - "9090:9090"   # Prometheus (metrics), optional for debugging
      - "3200:3200"   # Tempo (traces),        optional for debugging
    environment:
      # Grafana admin credentials (dev only).
      GF_SECURITY_ADMIN_USER: ${GF_SECURITY_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GF_SECURITY_ADMIN_PASSWORD:-admin}
      # Land on the Copilot overview dashboard when opening Grafana.
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /otel-lgtm/grafana/conf/provisioning/dashboards/custom/copilot-overview.json
    volumes:
      # Provider config that tells Grafana where to find our custom dashboards.
      - ./grafana/provisioning/dashboards/copilot.yaml:/otel-lgtm/grafana/conf/provisioning/dashboards/copilot.yaml:ro
      # All dashboard JSON files in this folder are auto-loaded on startup.
      - ./grafana/dashboards:/otel-lgtm/grafana/conf/provisioning/dashboards/custom:ro
      # Persist metrics/traces/logs across container restarts (dev convenience).
      - lgtm-data:/data
    healthcheck:
      test: ["CMD", "/otel-lgtm/docker/healthcheck.sh"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  lgtm-data:
